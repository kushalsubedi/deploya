name: CI — deploya

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── Build & Test ────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go 1.26.1
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...
      
      
      - name: Run tests
        run: go test ./...
      

  

  # ── Summary ───────────────────────────────────────────────────────
  notify:
    name: Summary
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - name: Pipeline summary
        run: |
          echo "## CI Summary — deploya" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          
